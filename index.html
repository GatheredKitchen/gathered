<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- ─── Primary Meta ───────────────────────────────────────────────── -->
    <title>Gathered · Every recipe worth keeping</title>
    <meta name="description" content="Scan, organize, and share your favorite recipes. Gathered turns handwritten recipe cards into a beautiful digital collection you'll actually use." />
    <meta name="theme-color" content="#0A0A0A" />

    <!-- ─── Favicons ───────────────────────────────────────────────────── -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />

    <!-- ─── PWA Manifest ───────────────────────────────────────────────── -->
    <link rel="manifest" href="/manifest.json" />

    <!-- ─── iOS PWA Support ────────────────────────────────────────────── -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Gathered" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- ─── Open Graph (Social Sharing) ────────────────────────────────── -->
    <meta property="og:title" content="Gathered" />
    <meta property="og:description" content="Every recipe worth keeping. Scan, organize, and share your favorite recipes." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://usegathered.app" />
    <meta property="og:image" content="https://usegathered.app/icon-512.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Gathered" />
    <meta name="twitter:description" content="Every recipe worth keeping." />
    <meta name="twitter:image" content="https://usegathered.app/icon-512.png" />

    <!-- ─── Fonts ──────────────────────────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />

    <style>
      html, body { margin: 0; padding: 0; background: #0A0A0A; }
      body { overscroll-behavior: none; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
