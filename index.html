  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #0A0A0A; --charcoal: #111111; --graphite: #1C1C1C;
      --smoke: #2A2A2A; --mid: #555555; --silver: #999999;
      --white: #FFFFFF; --gold: #C9A84C; --goldL: #E2C97E;
      --goldD: #6B5010; --goldBg: rgba(201,168,76,0.07);
      --goldBd: rgba(201,168,76,0.2);
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      overflow-x: hidden;
    }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; height: 64px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 48px;
      background: rgba(10,10,10,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(201,168,76,0.12);
      z-index: 1000;
    }
    .nav-brand { display: flex; align-items: center; gap: 12px; text-decoration: none; }
    .nav-brand img { height: 28px; width: auto; display: block; }
    .nav-wordmark {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.15rem; letter-spacing: 0.06em; color: var(--white);
    }
    .nav-tagline {
      font-size: 0.72rem;
      color: var(--mid);
      letter-spacing: 0.1em;
    }

    /* ── APP MOUNT ── */
    #app-section {
      padding-top: 64px;
      background: var(--black);
    }

    /* ── HERO ── */
    .hero {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 120px 40px 80px;
      position: relative; overflow: hidden;
    }
    .hero::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 40%, rgba(201,168,76,0.06) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero-border { position: absolute; inset: 24px; border: 1px solid rgba(201,168,76,0.15); pointer-events: none; }
    .hero-border::before { content: ''; position: absolute; inset: 8px; border: 1px solid rgba(201,168,76,0.06); }
    .hero-border::after { content: ''; position: absolute; top: -1px; left: -1px; width: 40px; height: 40px; border-top: 2px solid var(--gold); border-left: 2px solid var(--gold); }
    .corner-br { position: absolute; bottom: -1px; right: -1px; width: 40px; height: 40px; border-bottom: 2px solid var(--gold); border-right: 2px solid var(--gold); }
    .hero-eyebrow { font-size: 0.6rem; letter-spacing: 0.45em; text-transform: uppercase; color: var(--gold); margin-bottom: 28px; opacity: 0; animation: fadeUp 0.8s ease 0.2s forwards; }
    .hero-sprig { height: 56px; width: auto; margin-bottom: 28px; opacity: 0; animation: fadeUp 0.8s ease 0.3s forwards; }
    .hero-h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(3.5rem, 8vw, 6.5rem); font-weight: 300; line-height: 1.0; color: var(--white); margin-bottom: 16px; opacity: 0; animation: fadeUp 0.8s ease 0.4s forwards; }
    .hero-h1 em { color: var(--gold); font-style: italic; }
    .hero-sub { font-size: clamp(0.9rem, 2vw, 1.1rem); color: var(--silver); font-weight: 300; line-height: 1.8; max-width: 520px; margin: 0 auto 44px; opacity: 0; animation: fadeUp 0.8s ease 0.5s forwards; }
    .hero-actions { display: flex; gap: 14px; align-items: center; justify-content: center; flex-wrap: wrap; opacity: 0; animation: fadeUp 0.8s ease 0.6s forwards; }
    .btn-primary { display: inline-flex; align-items: center; gap: 10px; padding: 16px 36px; background: var(--gold); color: var(--black); text-decoration: none; font-size: 0.82rem; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; border-radius: 2px; transition: all 0.2s; border: none; cursor: pointer; }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-ghost { display: inline-flex; align-items: center; gap: 8px; padding: 16px 28px; background: none; color: var(--silver); text-decoration: none; font-size: 0.8rem; font-weight: 400; letter-spacing: 0.1em; border: 1px solid var(--smoke); border-radius: 2px; transition: all 0.2s; }
    .btn-ghost:hover { border-color: var(--goldBd); color: var(--gold); }
    .hero-tagline { margin-top: 56px; font-size: 0.7rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--mid); opacity: 0; animation: fadeUp 0.8s ease 0.8s forwards; }
    .hero-tagline span { color: var(--gold); margin: 0 10px; }

    /* ── SECTIONS ── */
    section { padding: 100px 48px; max-width: 1200px; margin: 0 auto; }
    .section-eyebrow { font-size: 0.58rem; letter-spacing: 0.38em; text-transform: uppercase; color: var(--gold); margin-bottom: 16px; display: block; }
    .section-heading { font-family: 'Cormorant Garamond', serif; font-size: clamp(2.2rem, 5vw, 3.8rem); font-weight: 300; color: var(--white); line-height: 1.1; margin-bottom: 16px; }
    .section-heading em { color: var(--gold); font-style: italic; }
    .section-sub { font-size: 0.92rem; color: var(--silver); font-weight: 300; line-height: 1.8; max-width: 520px; }
    .divider-line { width: 100%; height: 1px; background: linear-gradient(to right, transparent, var(--smoke), transparent); }

    /* ── HOW IT WORKS ── */
    .how-section { padding: 100px 48px; background: var(--charcoal); max-width: 100%; }
    .how-inner { max-width: 1100px; margin: 0 auto; }
    .how-header { text-align: center; margin-bottom: 72px; }
    .steps-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
    .step { padding: 48px 36px; background: var(--graphite); border: 1px solid var(--smoke); transition: border-color 0.3s; }
    .step:hover { border-color: var(--goldBd); }

    .step-icon { font-size: 2rem; margin-bottom: 18px; display: block; }
